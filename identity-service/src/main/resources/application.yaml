spring:
  application:
    name: identity-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema; Hibernate only validates
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC
    open-in-view: false           # Avoid lazy-loading anti-pattern in web layer

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ── JWT ────────────────────────────────────────────────────────────────────────
aibos:
  jwt:
    secret: ${JWT_SECRET:my-local-dev-secret-key-12345678901234567890}               # Min 32 chars; set via env var in production
    access-token-ttl: PT15M             # 15 minutes
    refresh-token-ttl: P7D              # 7 days

  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    price-ids:
          pro: ${STRIPE_PRICE_PRO:price_placeholder_pro}
          enterprise: ${STRIPE_PRICE_ENTERPRISE:price_placeholder_enterprise}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:8080}
# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.aibos: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN    # Set to DEBUG in dev to see queries